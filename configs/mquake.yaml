# best configurations for QA hops 2, 3, 4

base_output_dir: "saved_models/mquake/"
batch_size: 32
test_batch_size: 128
beta: 0.05
data_input_dir: "datasets/mquake/"
embedding_size: 50
eval_every: 100
gamma: 1.00
hidden_size: 50
Lambda: 0.05
learning_rate: 0.001
load_model: True
max_num_actions: 200
model_load_dir: "${base_output_dir}qa_nhop_reason_${path_length}hop_seed${seed}/model/model.ckpt"
num_rollouts: 20
test_rollouts: 100
total_iterations: 15000 # original 15000
train_entity_embeddings: True
train_relation_embeddings: True
print_predictions: False
question_tokenizer_name: "bert-base-uncased"
use_beam: False # Off for SPAWC
use_entity_embeddings: True
vocab_dir: "${data_input_dir}vocab"

# Recommended variables to tune
seed: 42
use_full_graph: True
use_directed_graph: False
path_segment_policy: "final_segment_truncate"
projection_adapter: "linear" # options: 'none', 'linear', 'mlp', 'residual'
projection_layers: 1
projection_hidden: 256
path_length: 4
question_format: "full_text"  # options: 'full_text', 'relation_only', 'graph_only'
raw_QAData_path: "${data_input_dir}/mquake_qa_nhop.csv"
cached_QAMetaData_path: "./.cache/itl/mquake_qa_nhop.json"
print_paths: True