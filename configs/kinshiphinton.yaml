# best configurations for QA hops 1, 2, 3

base_output_dir: "saved_models/kinshiphinton/"
batch_size: 16
test_batch_size: 64
beta: 0.27
data_input_dir: "datasets/kinshiphinton/"
embedding_size: 6
eval_every: 100
gamma: 1.00
hidden_size: 100
Lambda: 0.0017628132236469198
learning_rate: 0.0007
load_model: True
max_num_actions: 100
model_load_dir: "${base_output_dir}qa_nhop_reason_${path_length}hop_seed${seed}/model/model.ckpt"
num_rollouts: 30
test_rollouts: 100
total_iterations: 10000
train_entity_embeddings: True
train_relation_embeddings: True
print_predictions: False
question_tokenizer_name: "bert-base-uncased"
use_beam: False # Off for SPAWC
use_entity_embeddings: False
vocab_dir: "${data_input_dir}vocab"

# Recommended variables to tune
seed: 42
use_full_graph: True
use_directed_graph: False
path_segment_policy: "final_segment_truncate"
projection_adapter: "linear" # options: 'none', 'linear', 'mlp', 'residual'
projection_layers: 1
projection_hidden: 128
path_length: 3
question_format: "full_text"
raw_QAData_path: "${data_input_dir}kinship_qa_nhop.csv"
cached_QAMetaData_path: "./.cache/itl/kinship_qa_nhop.json"
print_paths: True